name: 2. Build DEV Images

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build (e.g. 1.42.0)'
        required: true

jobs:
  pick_runner:
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.check.outputs.runner }}
    steps:
      - name: Check self-hosted runner availability
        id: check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PIPELINE_TOKEN }}
          script: |
            const { data } = await github.rest.actions.listSelfHostedRunnersForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            const available = data.runners.some(r => r.status === 'online' && !r.busy);
            const runner = available ? 'self-hosted' : 'ubuntu-latest';
            core.info(`Self-hosted runners online: ${data.runners.filter(r => r.status === 'online').length}`);
            core.info(`Any idle: ${available} → using: ${runner}`);
            core.setOutput('runner', runner);

  build_and_publish:
    needs: pick_runner
    runs-on: ${{ needs.pick_runner.outputs.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - dockerfile: dockerfiles/Dockerfile.gatex-be
            image: gatex-be
          - dockerfile: dockerfiles/Dockerfile.gatex-ui
            image: gatex-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Docker version
        id: vars
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            GIT_TAG="${{ github.event.inputs.tag }}"
          else
            GIT_TAG="${{ github.ref_name }}"
          fi
          echo "VERSION=${GIT_TAG}-dev" >> $GITHUB_OUTPUT
          echo "Building Docker version: ${GIT_TAG}-dev"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PIPELINE_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push images
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/sainani7799/argo-gatex/${{ matrix.image }}:${{ steps.vars.outputs.VERSION }}
          cache-from: type=registry,ref=ghcr.io/sainani7799/argo-gatex/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=ghcr.io/sainani7799/argo-gatex/${{ matrix.image }}:buildcache,mode=max

      - name: Summary
        run: |
          echo "✅ Built and pushed: ${{ matrix.image }}:${{ steps.vars.outputs.VERSION }}"

  update_deployment_manifests:
    needs: build_and_publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v4
        with:
          repository: sainani7799/argo-manifest
          token: ${{ secrets.PIPELINE_TOKEN }}
          path: deployment-repo

      - name: Update image tags
        run: |
          VERSION="${{ github.ref_name }}-dev"
          # Update backend newTag
          sed -i "s|newTag: .*|newTag: $VERSION|" deployment-repo/base/gatex-be-service/kustomization.yaml
          # Update UI newTag
          sed -i "s|newTag: .*|newTag: $VERSION|" deployment-repo/base/gatex-ui-service/kustomization.yaml

      - name: Commit and push changes
        run: |
          cd deployment-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add base/gatex-be-service/kustomization.yaml base/gatex-ui-service/kustomization.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update images to $VERSION"
            git push
          fi