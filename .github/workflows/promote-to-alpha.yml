name: 2. Promote to ALPHA

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'DEV version to promote alpha(e.g., 1.0.5-dev)'
        required: true
        type: string

jobs:
  check_authorization:
    # Skip authorization check for release triggers (already controlled by release permissions)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    outputs:
      authorized: ${{ steps.check.outputs.authorized }}
    steps:
      - name: Check if user is authorized
        id: check
        env:
          GH_TOKEN: ${{ secrets.ORG_READ_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          # List of allowed users and teams (format for teams: org/team-name)
          # Examples: "user1 user2 schemax-pte-ltd/dev-team schemax-pte-ltd/qa-team"
          ALLOWED_USERS="SCHEMAX-PTE-LTD/devops SCHEMAX-PTE-LTD/code_approvers"
          
          TRIGGERED_BY="${{ github.actor }}"
          REPO="${{ github.repository }}"
          ORG="${REPO%%/*}"
          
          echo "🔍 Checking authorization for user: $TRIGGERED_BY"
          
          # Check if user is directly listed
          if echo "$ALLOWED_USERS" | grep -w "$TRIGGERED_BY" > /dev/null; then
            echo "✅ User $TRIGGERED_BY is directly authorized"
            echo "authorized=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Check team memberships
          for entry in $ALLOWED_USERS; do
            if [[ "$entry" == *"/"* ]]; then
              # This is a team (format: org/team-name)
              TEAM_SLUG="${entry#*/}"
              echo "🔍 Checking if $TRIGGERED_BY is in team: $entry"
              echo "   API endpoint: /orgs/$ORG/teams/$TEAM_SLUG/memberships/$TRIGGERED_BY"
              
              # Use GitHub API to check team membership
              if gh api \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/orgs/$ORG/teams/$TEAM_SLUG/memberships/$TRIGGERED_BY" 2>&1 | tee /tmp/api_response.txt; then
                
                # Check if response indicates active membership
                if grep -q '"state": "active"' /tmp/api_response.txt 2>/dev/null || \
                   grep -q '"role"' /tmp/api_response.txt 2>/dev/null; then
                  echo "✅ User $TRIGGERED_BY is authorized via team: $entry"
                  echo "authorized=true" >> $GITHUB_OUTPUT
                  exit 0
                fi
              else
                echo "⚠️  API call failed for team $entry (user may not be a member)"
              fi
            fi
          done
          
          echo "❌ User $TRIGGERED_BY is NOT authorized to promote to ALPHA"
          echo "Allowed users and teams: $ALLOWED_USERS"
          echo "authorized=false" >> $GITHUB_OUTPUT
          exit 1

  promote_to_alpha:
    needs: check_authorization
    # Always run for release triggers, conditional on authorization for manual triggers
    if: |
      always() && 
      (github.event_name == 'release' || 
       (github.event_name == 'workflow_dispatch' && needs.check_authorization.outputs.authorized == 'true'))
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - dockerfile: dockerfiles/Dockerfile.gatex-ui
          - image: gatex-ui
          - dockerfile: dockerfiles/Dockerfile.gatex-be
          - image: gatex-be

    steps:
      - name: Checkout code
        if: github.event_name == 'release'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            # Always use 1.0.{run_number}-alpha for release builds
            ALPHA_TAG="1.0.${{ github.run_number }}-alpha"
            
            echo "📦 Release trigger: ${{ github.event.release.tag_name }}"
            echo "🏗️  Building fresh image tagged: ${ALPHA_TAG}"
            echo "build_mode=true" >> $GITHUB_OUTPUT
          else
            # Manual trigger - retag existing dev image
            DEV_TAG="${{ github.event.inputs.version }}"
            ALPHA_TAG="${DEV_TAG/-dev/-alpha}"
            
            echo "🎯 Manual trigger: ${DEV_TAG} → ${ALPHA_TAG}"
            echo "dev_tag=${DEV_TAG}" >> $GITHUB_OUTPUT
            echo "build_mode=false" >> $GITHUB_OUTPUT
          fi
          
          echo "alpha_tag=${ALPHA_TAG}" >> $GITHUB_OUTPUT
          echo "✅ ALPHA tag: ${ALPHA_TAG}"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.version.outputs.build_mode == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Alpha image (Release trigger)
        if: steps.version.outputs.build_mode == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/schemax-pte-ltd/gatex/${{ matrix.image }}:${{ steps.version.outputs.alpha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install crane (Manual trigger)
        if: steps.version.outputs.build_mode == 'false'
        run: |
          curl -sL "https://github.com/google/go-containerregistry/releases/download/v0.19.0/go-containerregistry_Linux_x86_64.tar.gz" > crane.tar.gz
          tar -xzf crane.tar.gz crane
          chmod +x crane
          sudo mv crane /usr/local/bin/

      - name: Retag image to Alpha (Manual trigger)
        if: steps.version.outputs.build_mode == 'false'
        run: |
          DEV_TAG="${{ steps.version.outputs.dev_tag }}"
          ALPHA_TAG="${{ steps.version.outputs.alpha_tag }}"
          
          echo "Retagging ${DEV_TAG} to ${ALPHA_TAG}"
          
          crane copy \
            ghcr.io/schemax-pte-ltd/gatex/${{ matrix.image }}:${DEV_TAG} \
            ghcr.io/schemax-pte-ltd/gatex/${{ matrix.image }}:${ALPHA_TAG}
          
          echo "✅ Successfully retagged ${{ matrix.image }}:${ALPHA_TAG}"

      - name: Summary
        run: |
          echo "✅ Promotion complete!"
          echo ""
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "📦 Release: ${{ github.event.release.tag_name }}"
            echo "🔗 URL: ${{ github.event.release.html_url }}"
            echo "🏗️  Built fresh image: ${{ matrix.image }}:${{ steps.version.outputs.alpha_tag }}"
          else
            echo "🔄 Retagged: ${{ steps.version.outputs.dev_tag }} → ${{ steps.version.outputs.alpha_tag }}"
          fi
          echo ""
          echo "🎯 Next Steps:"
          echo "To promote to RC, go to Actions → '3. Promote to RC' → Run workflow"
