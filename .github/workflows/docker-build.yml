name: 1. Create Release Tag

on:
  push:
    branches:
      - main
    paths:
      - dockerfiles/**
      - services/**
      - ui/**
  workflow_dispatch:

jobs:
  create_tag:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # tag using new tag logic
      - name: Create and push Git tag
        run: |
          GIT_TAG="1.${{ github.run_number }}.0"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${GIT_TAG}"
          git push origin "${GIT_TAG}"

          echo "✅ Created Git tag: ${GIT_TAG}"
          echo "🎯 This will trigger the '2. Build DEV Images' workflow automatically"
